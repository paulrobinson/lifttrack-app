name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Copy PR files into preview folder
        run: |
          git fetch origin ${{ github.head_ref }}
          git checkout ${{ github.head_ref }} -- .
          mkdir -p previews/pr-${{ github.event.number }}
          # Adjust the source path below if your site lives in /docs rather than root
          rsync -av --exclude='previews/' --exclude='.git/' . previews/pr-${{ github.event.number }}/

      - name: Commit preview to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add previews/
          git commit -m "Preview for PR #${{ github.event.number }}" || echo "No changes"
          git push origin main

      - name: Post comment with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/previews/pr-${{ github.event.number }}/`;
            const marker = '<!-- pr-preview -->';
            const body = `${marker}\n🔍 **Preview:** ${url}`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.number }}
            });
            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ github.event.number }},
                body
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Remove preview folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -rf previews/pr-${{ github.event.number }} || echo "Nothing to remove"
          git commit -m "Remove preview for PR #${{ github.event.number }}" || echo "No changes"
          git push origin main
