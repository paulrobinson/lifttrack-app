name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_STORAGE_PREFIX: preview_pr${{ github.event.number }}_

      - name: Copy built output into preview folder on previews branch
        run: |
          cp -r dist/public /tmp/pr-preview
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin previews || true
          if git rev-parse --verify origin/previews >/dev/null 2>&1; then
            git checkout -B previews origin/previews
          else
            git checkout --orphan previews
            git rm -rf . || true
            git commit --allow-empty -m "Init previews branch"
          fi
          mkdir -p previews/pr-${{ github.event.number }}
          rsync -av --delete /tmp/pr-preview/ previews/pr-${{ github.event.number }}/
          git add previews/
          git commit -m "Preview for PR #${{ github.event.number }}" || echo "No changes"
          git push origin previews

      - name: Trigger Pages deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            });

      - name: Post comment with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/previews/pr-${{ github.event.number }}/`;
            const marker = '<!-- pr-preview -->';
            const body = `${marker}\n🔍 **Preview:** ${url}`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.number }}
            });
            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ github.event.number }},
                body
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: previews

      - name: Remove preview folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -rf previews/pr-${{ github.event.number }} || echo "Nothing to remove"
          git commit -m "Remove preview for PR #${{ github.event.number }}" || echo "No changes"
          git push origin previews

      - name: Trigger Pages deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            });
